<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>League Of Legends</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <main class="container">
        <header class="header">
            <img class="header-img" src="./images/image 44.jpg" alt="League of Legends hero banner">
        </header>

        <nav class="nav">
            <img class="image-nav" src="./images/image 20.png" alt="League of Legends logo">
            <ul class="menu">
                <li>Game</li>
                <li>Champions</li>
                <li>News</li>
                <li>Patch Notes</li>
                <li>Discover</li>
                <li>Esports</li>
                <li>Universe</li>
            </ul>
        </nav>

        <section class="content">
            <article class="card">
                <img class="character-img" src="./images/image 31.jpg" alt="Ahri">
                <h3 class="name">AHRI</h3>
            </article>
            <article class="card">
                <img class="character-img" src="./images/Group 3.png" alt="Akali">
                <h3 class="name">AKALI</h3>
            </article>
            <article class="card">
                <img class="character-img" src="./images/Group 2.png" alt="Azir">
                <h3 class="name">AZIR</h3>
            </article>
            <article class="card">
                <img class="character-img" src="./images/Group 1.png" alt="Caitlyn">
                <h3 class="name">CAITLYN</h3>
            </article>

            <article class="card">
                <img class="character-img" src="./images/image 35.png" alt="Darius">
                <h3 class="name">DARIUS</h3>
            </article>
            <article class="card">
                <img class="character-img" src="./images/image 36.png" alt="Fizz">
                <h3 class="name">FIZZ</h3>
            </article>
            <article class="card">
                <img class="character-img" src="./images/image 37.png" alt="Irelia">
                <h3 class="name">IRELIA</h3>
            </article>
            <article class="card">
                <img class="character-img" src="./images/image 38.png" alt="Jinx">
                <h3 class="name">JINX</h3>
            </article>

            <article class="card">
                <img class="character-img" src="./images/image 39.png" alt="Rengar">
                <h3 class="name">RENGAR</h3>
            </article>
            <article class="card">
                <img class="character-img" src="./images/image 40.png" alt="Seraphine">
                <h3 class="name">SERAPHINE</h3>
            </article>
            <article class="card">
                <img class="character-img" src="./images/image 41.png" alt="Yasuo">
                <h3 class="name">YASUO</h3>
            </article>
            <article class="card">
                <img class="character-img" src="./images/image 42.png" alt="Wukong">
                <h3 class="name">WUKONG</h3>
            </article>
        </section>

        <section class="banner-bottom">
            <img src="./images/image 44.jpg" alt="League of Legends event banner">
        </section>

        <section class="video-section">
            <h2>Day la video</h2>
            <iframe
                src="https://www.youtube.com/embed/O4PDzBnBMU4"
                title="League of Legends Video"
                loading="lazy"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                allowfullscreen>
            </iframe>
        </section>

        <footer class="footer">
            <p>&copy; 2019 All Rights Reserved</p>
            <div class="footer-actions">
                <button type="button" class="btn btn-secondary">Lorem Archive</button>
                <button type="button" class="btn btn-primary">Play Now</button>
            </div>
        </footer>
    </main>
</body>
</html>
