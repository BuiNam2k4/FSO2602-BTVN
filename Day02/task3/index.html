<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Popular Collections UI</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="main-container">
      <header>
        <h1>Popular Collections</h1>
        <div class="tags">
          <span class="tag">Profile</span>
          <span class="tag">New York</span>
          <span class="tag">Relaxing</span>
          <span class="tag">Person</span>
          <span class="tag">Fashion</span>
        </div>
      </header>

      <div class="collections-grid">
        <div class="collection-card">
          <div class="gallery">
            <img src="./images/Rectangle 1.jpg" alt="main" class="main-img" />
            <div class="thumb-row">
              <img src="./images/Rectangle 1.png" alt="thumb" />
              <img src="./images/Rectangle 3.png" alt="thumb" />
              <img src="./images/Rectangle 4.png" alt="thumb" />
            </div>
          </div>
          <div class="card-footer">
            <h3>People</h3>
            <span class="count"><i class="fa-regular fa-image"></i> 144</span>
          </div>
        </div>

        <div class="collection-card">
          <div class="gallery">
            <img
              src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=500"
              alt="main"
              class="main-img"
            />
            <div class="thumb-row">
              <img
                src="https://images.unsplash.com/photo-1501854140801-50d01698950b?q=80&w=200"
                alt="thumb"
              />
              <img
                src="https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?q=80&w=200"
                alt="thumb"
              />
              <img
                src="https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?q=80&w=200"
                alt="thumb"
              />
            </div>
          </div>
          <div class="card-footer">
            <h3>Nature</h3>
            <span class="count"><i class="fa-regular fa-image"></i> 7K</span>
          </div>
        </div>

        <div class="collection-card">
          <div class="gallery">
            <img
              src="https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=500"
              alt="main"
              class="main-img"
            />
            <div class="thumb-row">
              <img
                src= "./images/Rectangle 3.png"
                alt="thumb"
              />
              <img
                src="https://images.unsplash.com/photo-1564507592333-c60657eea523?q=80&w=200"
                alt="thumb"
              />
              <img
                src="./images/Rectangle 1.jpg"
                alt="thumb"
              />
            </div>
          </div>
          <div class="card-footer">
            <h3>History</h3>
            <span class="count"><i class="fa-regular fa-image"></i> 431</span>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
