<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Part-Time Jobs</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg-shape"></div>

    <div class="container">
      <div class="top-bar">
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" placeholder="Search for a part-time job" />
        </div>
        <button class="map-btn">
          <i class="fa-regular fa-map"></i> Use map
        </button>
      </div>

      <div class="categories-grid">
        <div class="category-item item-furniture">
          <i class="fa-solid fa-couch"></i>
          <span>Furniture</span>
        </div>

        <div class="category-item item-property">
          <i class="fa-solid fa-house"></i>
          <span>Property</span>
        </div>

        <div class="category-item item-job">
          <i class="fa-solid fa-building"></i>
          <span>Job</span>
        </div>

        <div class="category-item item-travel">
          <i class="fa-solid fa-plane"></i>
          <span>Travel</span>
        </div>

        <div class="category-item item-boat">
          <i class="fa-solid fa-sailboat"></i>
          <span>Boat</span>
        </div>

        <div class="category-item item-mc">
          <i class="fa-solid fa-motorcycle"></i>
          <span>MC</span>
        </div>

        <div class="category-item item-economy">
          <i class="fa-solid fa-wallet"></i>
          <span>Economy</span>
        </div>

        <div class="category-item item-holiday">
          <i class="fa-solid fa-couch"></i>
          <span>Holiday</span>
        </div>
      </div>
    </div>
  </body>
</html>
